services:
  - type: web
    name: todo-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: |
      npm install
      npm run -w @todo/shared build
      npm run -w @todo/server build
      npm run -w @todo/server db:migrate
    startCommand: npm run -w @todo/server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://todo.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString

databases:
  - name: todo-db
    databaseName: todo
    user: todo
    plan: free
    region: oregon
